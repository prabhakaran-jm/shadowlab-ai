# ShadowLab – Chaos Engineering for AI APIs
# Optional dev environment: backend (FastAPI) + frontend (Next.js)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GRADIENT_API_URL=${GRADIENT_API_URL:-}
      - GRADIENT_API_KEY=${GRADIENT_API_KEY:-}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
